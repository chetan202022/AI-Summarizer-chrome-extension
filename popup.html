<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Summarizer</title>

    <style>
        :root {
            --bg: #ffffff;
            --card: #f8f9fa;
            --text: #222;
            --border: #ddd;
            --primary: #4285f4;
            --primary-hover: #3367d6;
            --success: #34a853;
            --success-hover: #2e8b57;
            --secondary: #666;
            --secondary-hover: #555;
        }

        body.dark {
            --bg: #1f1f1f;
            --card: #2b2b2b;
            --text: #f2f2f2;
            --border: #444;
        }

        body {
            font-family: Arial, sans-serif;
            width: 520px;
            min-height: 400px;
            padding: 15px;
            margin: 0;

            background: var(--bg);
            color: var(--text);

            transition: background 0.2s ease,
                        color 0.2s ease;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 15px;
        }

        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        select,
        button {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 13px;
        }

        select {
            flex: 1;
            background: var(--bg);
            color: var(--text);
        }

        button {
            cursor: pointer;
            color: white;
            border: none;
            font-weight: 600;
        }

        #summarize {
            background: var(--primary);
        }

        #summarize:hover {
            background: var(--primary-hover);
        }

        #copy-btn {
            background: var(--success);
        }

        #copy-btn:hover {
            background: var(--success-hover);
        }

        #export-btn,
        #settings-btn {
            background: var(--secondary);
        }

        #export-btn:hover,
        #settings-btn:hover {
            background: var(--secondary-hover);
        }

        #result {
            margin-top: 15px;
            padding: 15px;

            border: 1px solid var(--border);
            border-radius: 8px;

            background: var(--card);

            min-height: 180px;
            max-height: 420px;

            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 150px;
        }

        .loader {
            width: 32px;
            height: 32px;

            border: 4px solid #ddd;
            border-top: 4px solid var(--primary);

            border-radius: 50%;

            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .sr-only {
            position: absolute;
            left: -9999px;
        }
    </style>
</head>

<body>

<h2>🤖 AI Summarizer</h2>

<div class="row">

    <label for="summary-type" class="sr-only">
        Summary Type
    </label>

    <select id="summary-type">
        <option value="brief">Brief Summary</option>
        <option value="detailed">Detailed Summary</option>
        <option value="bullets">Bullet Points</option>
    </select>

</div>

<div class="row">

    <label for="language" class="sr-only">
        Language
    </label>

    <select id="language">
        <option value="English">English</option>
        <option value="Hindi">Hindi</option>
        <option value="Spanish">Spanish</option>
        <option value="French">French</option>
        <option value="German">German</option>
        <option value="Japanese">Japanese</option>
    </select>

    <label for="theme" class="sr-only">
        Theme
    </label>

    <select id="theme">
        <option value="system">System Theme</option>
        <option value="light">Light Mode</option>
        <option value="dark">Dark Mode</option>
    </select>

</div>

<div class="row">

    <button id="summarize">
        Summarize
    </button>

    <button id="copy-btn">
        Copy
    </button>

    <button id="export-btn">
        Export TXT
    </button>

    <button id="settings-btn">
        Settings
    </button>

</div>

<div id="result">
    Select a summary type and click "Summarize" to generate an AI-powered summary.
</div>

<script src="popup.js"></script>

</body>
</html>
