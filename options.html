<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Summarizer Settings</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
    }

    h1 {
      color: #4285f4;
      margin-bottom: 10px;
    }

    .description {
      color: #555;
      margin-bottom: 25px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px;
      box-sizing: border-box;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      background-color: #4285f4;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background-color: #3367d6;
    }

    .success-message {
      color: green;
      margin-top: 15px;
      display: none;
      font-weight: bold;
    }

    a {
      color: #4285f4;
    }

    .note {
      margin-top: 20px;
      font-size: 13px;
      color: #666;
      background: #f5f5f5;
      padding: 12px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

  <h1>AI Summarizer Settings</h1>

  <p class="description">
    Enter your Groq API key to enable AI-powered summaries.
  </p>

  <div class="form-group">
    <label for="api-key">Groq API Key</label>

    <input
      type="password"
      id="api-key"
      placeholder="gsk_..."
    />

    <p>
      Get a free API key from
      <a
  href="https://console.groq.com/keys"
  target="_blank"
  rel="noopener noreferrer"
>
        Groq Console
      </a>
    </p>
  </div>

  <button id="save-button">
    Save Settings
  </button>

  <p id="success-message" class="success-message">
    ✓ Settings saved successfully!
  </p>

  <div class="note">
    Your API key is stored locally using Chrome Sync Storage and is never shared by this extension.
  </div>

  <script src="options.js"></script>

</body>
</html>
